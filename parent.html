<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>앤서수학 학습 현황</title>
<style>
  :root{--bg:#faf6f1;--card:#fff;--line:#ece4db;--text:#22201d;--muted:#8b8279;--brand:#c0452f;--brand-soft:#fbe9e4;
    --green:#16a34a;--green-soft:#e7f6ec;--red:#dc2626;--red-soft:#fdeaea;--amber:#d97706;--amber-soft:#fdf1e0;--star:#f5a623;}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  #bar{background:var(--card);border-bottom:1px solid var(--line);padding:11px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:5}
  .badge-logo{width:34px;height:34px;flex:none;border-radius:10px;background:var(--brand);color:#fff;font-weight:800;font-size:19px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 14px -6px rgba(192,69,47,.6)}
  .logo{font-weight:800;font-size:17px;color:var(--brand);line-height:1.1}
  .logo small{display:block;font-size:11px;color:var(--muted);font-weight:500}
  .spacer{flex:1}
  .who-chip{font-size:12px;color:var(--muted);background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:5px 11px;font-weight:600}
  main{max-width:600px;margin:16px auto;padding:0 16px 70px}
  .hero{background:linear-gradient(180deg,#fbe6d6 0%,#faf6f1 95%);border:1px solid var(--line);border-radius:20px;padding:20px 20px 22px;margin-bottom:16px}
  .hero .hkicker{font-size:12px;font-weight:700;color:var(--brand);margin:0 0 7px}
  .hero h1{margin:0;font-size:24px;font-weight:800;color:#2a221e}
  .hero p{margin:3px 0 0;font-size:13px;color:var(--muted)}
  .seg{display:flex;gap:8px;margin:0 0 14px}
  .seg button{flex:1;padding:10px 0;border:1px solid var(--line);background:var(--card);border-radius:10px;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit}
  .seg button.active{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}
  .mrow{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin:0 0 13px;-webkit-overflow-scrolling:touch}
  .mchip{flex:none;padding:7px 15px;border:1px solid var(--line);background:var(--card);border-radius:20px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;white-space:nowrap}
  .mchip.on{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}
  section{display:none} section.on{display:block}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px;margin-bottom:12px;box-shadow:0 6px 20px -16px rgba(80,45,25,.35)}
  .crow{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .date{font-size:12px;font-weight:700;color:var(--brand);background:var(--brand-soft);border-radius:20px;padding:3px 11px;white-space:nowrap}
  .content{font-size:15px;font-weight:600;margin:9px 0 0;line-height:1.5;color:var(--text)}
  .pill{font-size:11px;font-weight:700;border-radius:20px;padding:3px 9px;white-space:nowrap}
  .p-out{background:var(--red-soft);color:var(--red)} .p-late{background:var(--amber-soft);color:var(--amber)}
  .bar{height:7px;background:#f0eae3;border-radius:6px;margin-top:11px;overflow:hidden}
  .bar>i{display:block;height:100%;background:var(--green);border-radius:6px}
  .barlabel{font-size:11px;color:var(--muted);margin-top:6px}
  .hwitem{display:flex;align-items:flex-start;gap:11px}
  .chk{font-size:21px;line-height:1.1;color:#cbbfb3;flex:none;margin-top:1px} .chk.on{color:var(--green)}
  .hwitem .htxt{font-size:14px;flex:1;line-height:1.5} .hwitem.done .htxt{color:var(--muted)}
  .tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--amber-soft);color:var(--amber);margin-left:6px}
  .stars{color:var(--star);font-size:14px;letter-spacing:1px}
  .empty{text-align:center;color:var(--muted);padding:34px 10px;font-size:14px}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:22px;line-height:1.7}
  .center{display:flex;align-items:center;justify-content:center;min-height:62vh;text-align:center;padding:20px;color:var(--muted);font-size:14px;line-height:1.7}
</style>
</head>
<body>
<div id="bar">
  <div class="badge-logo">앤</div>
  <div class="logo">앤서수학<small>학습 현황</small></div>
  <div class="spacer"></div>
  <div class="who-chip" id="chip"></div>
</div>
<main id="app"><div class="center">불러오는 중…</div></main>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SUPABASE_URL = "https://hddsyoaymvpfcloqthyv.supabase.co";
const SUPABASE_KEY = "sb_publishable_cJHc-U-rvFrHVogusPcJ7A_x6uV1E4-";
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const app = document.getElementById("app");
const chip = document.getElementById("chip");
const token = new URLSearchParams(location.search).get("t");
const esc = s => (s??"").toString().replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const fmt = d => { if(!d) return ""; const p=d.split("-"); return `${+p[1]}/${+p[2]}`; };
const statusPill = s => s==="결석" ? `<span class="pill p-out">결석</span>` : s==="지각" ? `<span class="pill p-late">지각</span>` : "";

async function main(){
  if(!token){ app.innerHTML = `<div class="center">잘못된 접근입니다.<br>학원에서 받은 링크로 들어와 주세요.</div>`; return; }
  const { data, error } = await sb.rpc("get_student_feed", { p_token: token });
  if(error || !data){ app.innerHTML = `<div class="center">링크가 만료되었거나 올바르지 않습니다.<br>가람쌤(010-7419-3664)에게 문의해 주세요.</div>`; return; }

  const st = data.student || {};
  const lessons = (data.lessons || []).slice().sort((a,b)=> (a.date<b.date?-1:a.date>b.date?1:0)); // 오래된 → 최신
  const homework = data.homework || [];
  const videos = data.videos || [];

  chip.textContent = (st.name||"학생") + " 학부모님";

  // 월 목록 (YYYY-MM, 오름차순) — 기본은 가장 최근 달
  const months = [...new Set(lessons.map(l=>l.date.slice(0,7)))];
  let curMonth = months.length ? months[months.length-1] : null;
  const mLabel = ym => (+ym.slice(5,7)) + "월";

  const lessonCard = l => `
    <div class="card">
      <div class="crow"><span class="date">${fmt(l.date)}</span>${statusPill(l.status)}</div>
      <div class="content">${esc(l.content)||"—"}</div>
      ${l.completion!=null ? `<div class="bar"><i style="width:${Math.max(0,Math.min(100,l.completion))}%"></i></div><div class="barlabel">숙제 완성도 ${l.completion}%</div>` : ``}
    </div>`;

  function lessonSection(){
    if(!months.length) return `<div class="empty">아직 등록된 일지가 없어요.</div>`;
    const chips = `<div class="mrow">` + months.map(m=>`<button class="mchip ${m===curMonth?'on':''}" data-m="${m}">${mLabel(m)}</button>`).join("") + `</div>`;
    const list = lessons.filter(l=>l.date.slice(0,7)===curMonth).map(lessonCard).join("") || `<div class="empty">이 달 일지가 없어요.</div>`;
    return chips + list;
  }

  const hwHtml = homework.length ? homework.map(h=>`
    <div class="card hwitem ${h.done?'done':''}">
      <span class="chk ${h.done?'on':''}">${h.done?'✓':'○'}</span>
      <div class="htxt">
        <span class="date">${fmt(h.due)}</span>${h.is_video?`<span class="tag">🎬 영상</span>`:``}
        <div style="margin-top:6px">${esc(h.content)||"—"}</div>
      </div>
    </div>`).join("") : `<div class="empty">등록된 숙제가 없어요.</div>`;

  const vidHtml = videos.length ? videos.map(v=>`
    <div class="card">
      <div class="crow"><span class="date">${fmt(v.date)}</span><span class="stars">${v.stars?"★".repeat(v.stars):""}</span></div>
      <div class="content">${esc(v.title)||"복습영상"}</div>
      <div class="barlabel">상태: ${esc(v.status)||"제출됨"}</div>
    </div>`).join("") : `<div class="empty">제출된 복습영상이 없어요.</div>`;

  app.innerHTML = `
    <div class="hero">
      <p class="hkicker">📘 앤서수학 학습 현황</p>
      <h1>${esc(st.name)||"학생"}</h1>
      <p>${[st.school,st.grade].filter(Boolean).map(esc).join(" · ")||"수업일지 · 숙제 · 복습영상"}</p>
    </div>
    <div class="seg">
      <button class="active" data-t="l">📝 수업일지</button>
      <button data-t="h">📚 숙제</button>
      <button data-t="v">🎬 복습영상</button>
    </div>
    <section id="s-l" class="on">${lessonSection()}</section>
    <section id="s-h">${hwHtml}</section>
    <section id="s-v">${vidHtml}</section>
    <footer>앤서수학교습소 · 문의 010-7419-3664<br><span style="font-size:11px">이 페이지는 ${esc(st.name)||""} 학부모님 전용입니다.</span></footer>`;

  // 상단 탭 전환
  app.querySelectorAll(".seg button").forEach(b=>b.onclick=()=>{
    app.querySelectorAll(".seg button").forEach(x=>x.classList.remove("active"));
    app.querySelectorAll("section").forEach(x=>x.classList.remove("on"));
    b.classList.add("active");
    app.querySelector("#s-"+b.dataset.t).classList.add("on");
  });

  // 월 버튼 전환 (이벤트 위임)
  const sl = app.querySelector("#s-l");
  sl.addEventListener("click", e=>{
    const b = e.target.closest(".mchip"); if(!b) return;
    curMonth = b.dataset.m;
    sl.innerHTML = lessonSection();
  });
}
main();
</script>
</body>
</html>
