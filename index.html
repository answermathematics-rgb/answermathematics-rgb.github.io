<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>앤서수학 학생 포털</title>
<style>
  :root{--bg:#faf6f1;--card:#ffffff;--line:#ece4db;--text:#22201d;--muted:#8b8279;--brand:#c0452f;--brand-soft:#fbe9e4;
    --green:#16a34a;--green-soft:#e7f6ec;--red:#dc2626;--red-soft:#fdeaea;--amber:#d97706;--amber-soft:#fdf1e0;--star:#f5a623;--kakao:#FEE500;
    --ter:#c0452f;--ink:#22201d;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);}
  #bar{background:var(--card);border-bottom:1px solid var(--line);padding:11px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:5;}
  .logo{font-weight:800;font-size:18px;color:var(--brand);line-height:1.1;}
  .logo small{display:block;font-size:11px;color:var(--muted);font-weight:500;}
  .spacer{flex:1;}
  .who{font-size:13px;color:var(--muted);} .who b{color:var(--text);}
  .ghostbtn{border:1px solid var(--line);background:var(--card);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;color:var(--muted);}
  select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:var(--card);}
  main{max-width:880px;margin:18px auto;padding:0 16px 70px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px;box-shadow:0 6px 20px -16px rgba(80,45,25,.35);}
  .chcard{display:flex;align-items:center;gap:12px;background:#fffdf3;border:1px solid #f4e7b8;border-radius:16px;padding:13px 14px;margin-bottom:16px;}
  .chico{width:42px;height:42px;flex:none;border-radius:50%;background:var(--kakao);display:flex;align-items:center;justify-content:center;font-size:20px;}
  .chtx{flex:1;min-width:0;} .chtx b{display:block;font-size:14px;color:#3b1e1e;} .chtx span{font-size:12px;color:var(--muted);line-height:1.45;display:block;margin-top:2px;}
  .chbtn{flex:none;background:var(--kakao);color:#3b1e1e;font-weight:800;font-size:13px;border-radius:11px;padding:11px 13px;text-decoration:none;white-space:nowrap;}
  .card h2{margin:0 0 4px;font-size:16px;} .sub{color:var(--muted);font-size:13px;margin:0 0 14px;}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
  .b-teacher{background:#efe9fb;color:#6b3fd1;} .b-stu{background:var(--brand-soft);color:var(--brand);} .b-parent{background:var(--green-soft);color:var(--green);}
  .hero{text-align:center;padding:34px 0 8px;} .hero .lg{font-size:32px;font-weight:800;color:var(--brand);} .hero p{color:var(--muted);margin:8px 0 0;font-size:14px;}
  .kbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--kakao);color:#191600;border:0;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;}
  .demobtn{display:block;width:100%;background:var(--card);color:var(--text);border:1px solid var(--line);border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;}
  .loginwrap{max-width:360px;margin:0 auto;} .note{font-size:12px;color:var(--muted);text-align:center;margin-top:16px;line-height:1.6;}
  .seg{display:flex;gap:8px;} .seg.small{max-width:200px;margin-bottom:4px;}
  .seg button{flex:1;padding:9px;border:1px solid var(--line);background:var(--card);border-radius:8px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;}
  .seg button.active{border-color:var(--brand);color:var(--brand);background:var(--brand-soft);}
  .calhdr{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-top:8px;} .calhdr span{text-align:center;font-size:11px;color:var(--muted);font-weight:700;}
  .mgrid,.week{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-top:7px;}
  .day,.mcell{background:var(--card);border:1px solid var(--line);border-radius:12px;text-align:center;cursor:pointer;}
  .day{padding:9px 4px;} .mcell{min-height:56px;padding:5px 3px 7px;display:flex;flex-direction:column;align-items:center;gap:2px;}
  .day:hover,.mcell:hover{border-color:var(--brand);} .day.today,.mcell.today{background:var(--brand-soft);border:2px solid var(--brand);}
  .day .dnum,.mcell .mn{font-size:11px;color:var(--muted);} .mcell .mn{align-self:flex-start;margin-left:4px;} .mcell.today .mn,.day.today .dnum{color:var(--brand);font-weight:700;}
  .ic{font-size:20px;line-height:1.3;} .ic-done{color:var(--green);} .ic-miss{color:var(--red);} .ic-todo{color:var(--brand);} .ic-none{color:#cbd2dc;}
  .hwitem{display:flex;align-items:center;gap:11px;padding:11px 2px;border-top:1px solid var(--line);} .hwitem:first-of-type{border-top:0;}
  .chk{font-size:22px;cursor:pointer;color:#cbd2dc;user-select:none;} .chk.on{color:var(--green);}
  .hwitem .txt{font-size:14px;flex:1;} .hwitem.done .txt{text-decoration:line-through;color:var(--muted);} .readonly .chk{cursor:default;}
  .tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:#eef1f4;color:#6b7280;} .tag.stu{background:var(--brand-soft);color:var(--brand);} .tag.video{background:var(--amber-soft);color:var(--amber);}
  label{font-size:12px;color:var(--muted);display:block;margin:10px 0 4px;font-weight:600;}
  input[type=text],input[type=number],input[type=date]{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;} .row>div{flex:1;min-width:120px;}
  .btn{background:var(--brand);color:#fff;border:0;border-radius:11px;padding:12px 16px;font-size:14px;font-weight:700;cursor:pointer;margin-top:14px;} .btn.ghost{background:var(--bg);color:var(--text);border:1px solid var(--line);}
  .btn.amber{background:var(--amber);} .btn.full{width:100%;}
  .stat{display:flex;gap:10px;margin-top:8px;} .stat .box{flex:1;background:var(--bg);border-radius:10px;padding:11px;text-align:center;} .stat .box b{display:block;font-size:22px;} .stat .box span{font-size:11px;color:var(--muted);}
  .hint{font-size:12px;color:var(--muted);margin-top:8px;} .empty{color:var(--muted);font-size:13px;padding:14px 0;text-align:center;}
  .vid{border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:10px;} .vid .vh{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;} .vid .vt{font-weight:600;font-size:14px;}
  .stars{color:var(--star);font-size:14px;letter-spacing:1px;} .vid .fb{font-size:13px;color:#374151;line-height:1.55;margin:4px 0 0;} .vid .err{font-size:12px;background:var(--red-soft);color:#a3261f;border-radius:8px;padding:7px 10px;margin-top:7px;}
  .preview{display:flex;gap:10px;background:var(--brand-soft);border-radius:12px;padding:13px;align-items:flex-start;} .preview .ttl{font-size:13px;font-weight:700;color:var(--ter);margin:0 0 4px;} .preview p{margin:0;font-size:13px;color:#9a4636;line-height:1.55;}
  .lock{font-size:12px;color:var(--muted);background:var(--bg);border-radius:8px;padding:8px 11px;margin-top:6px;}
  .banner{background:var(--amber-soft);color:#7a4d06;font-size:12px;padding:8px 14px;text-align:center;}
  .srow{display:flex;align-items:center;gap:10px;padding:10px 2px;border-top:1px solid var(--line);cursor:pointer;} .srow:first-of-type{border-top:0;} .srow:hover{background:var(--bg);}
  .srow .sn{font-weight:600;font-size:14px;flex:1;} .srow .meta{font-size:12px;color:var(--muted);}
  .pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--green-soft);color:var(--green);} .pill.warn{background:var(--red-soft);color:var(--red);} .pill.gray{background:#efe9e3;color:#8b8279;}

  /* ===== 로그인·학원소개 리디자인 (따뜻한 카드형) ===== */
  #app .lpx{max-width:460px;margin:0 auto;}
  .lpx-top{background:linear-gradient(180deg,#fbe6d6 0%,#faf6f1 92%);border-radius:0 0 30px 30px;padding:24px 18px 22px;text-align:center;margin:-18px -16px 16px;}
  .lpx-brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px;}
  .lpx-badge{width:44px;height:44px;border-radius:13px;background:var(--ter);color:#fff;font-weight:800;font-size:25px;display:flex;align-items:center;justify-content:center;box-shadow:0 7px 16px -6px rgba(192,69,47,.65);}
  .lpx-bname{font-size:21px;font-weight:800;color:#3a2f29;}
  .lpx-slogan{font-size:25px;line-height:1.34;font-weight:800;color:#2a221e;margin:4px 0 8px;letter-spacing:-.02em;}
  .lpx-slogan em{color:var(--ter);font-style:normal;}
  .lpx-sub{color:var(--muted);font-size:14px;margin:0 0 20px;line-height:1.55;}
  .lpx-login{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 16px 36px -22px rgba(80,45,25,.45);text-align:left;}
  .lpx-login .lh{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:#6b6058;margin:2px 2px 11px;}
  .lpx-login .dot{width:8px;height:8px;border-radius:50%;background:var(--green);}
  .lpx-kakao{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--kakao);color:#3b1e1e;border:0;border-radius:14px;padding:15px;font-size:15.5px;font-weight:800;cursor:pointer;}
  .lpx-chan{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;background:#fff;color:#8b8279;border:1px solid var(--line);border-radius:12px;padding:10px;font-size:12.5px;font-weight:600;cursor:pointer;text-decoration:none;margin-top:8px;}
  .lpx-note{font-size:11.5px;color:var(--muted);line-height:1.6;margin:12px 2px 2px;}
  .lpx-scroll{display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--muted);font-size:12.5px;margin:20px 0 8px;}
  .lpx-scroll .arw{width:30px;height:30px;border-radius:50%;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--ter);font-size:14px;}
  .lpx-sec{background:#fff;border:1px solid var(--line);border-radius:20px;padding:20px;margin:0 0 14px;}
  .lpx-sec h2{font-size:16px;margin:0 0 14px;color:#2a221e;}
  .lpx-feat{display:flex;gap:13px;padding:14px 0;border-top:1px solid var(--line);}
  .lpx-feat:first-of-type{border-top:0;padding-top:2px;}
  .lpx-fic{width:42px;height:42px;flex:none;border-radius:12px;background:var(--brand-soft);display:flex;align-items:center;justify-content:center;font-size:21px;}
  .lpx-feat h3{font-size:14.5px;margin:2px 0 4px;color:var(--ter);}
  .lpx-feat p{font-size:13px;color:#6b6058;line-height:1.62;margin:0;}
  .lpx-teach{font-size:14px;color:#5a514a;line-height:1.78;margin:0;}
  .lpx-teach b{color:var(--ter);}
  .lpx-addr{font-size:14px;color:#5a514a;line-height:1.72;margin:0 0 14px;}
  .lpx-addr b{color:#2a221e;}
  .lpx-cta{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .lpx-cta a{display:flex;align-items:center;justify-content:center;gap:6px;border-radius:13px;padding:13px;font-size:13.5px;font-weight:700;text-decoration:none;border:1px solid var(--line);background:#fff;color:#5a514a;min-height:48px;}
  .lpx-cta a.main{grid-column:1/-1;background:var(--kakao);color:#3b1e1e;border:0;font-size:15px;}
  .lpx-foot{text-align:center;color:var(--muted);font-size:11.5px;line-height:1.7;padding:14px 0 4px;}
  @media(max-width:480px){.lpx-slogan{font-size:22px;}}
</style>

<body>
<div id="bar"></div>
<div id="banner"></div>
<main id="app"><div class="card"><div class="empty">불러오는 중…</div></div></main>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SUPABASE_URL='https://hddsyoaymvpfcloqthyv.supabase.co';
const SUPABASE_KEY='sb_publishable_cJHc-U-rvFrHVogusPcJ7A_x6uV1E4-';
const sb=createClient(SUPABASE_URL, SUPABASE_KEY);

const KAKAO_FRIEND='http://pf.kakao.com/_pxlUnX/friend';
const KAKAO_CHAT='http://pf.kakao.com/_pxlUnX/chat';
const INSTA_URL='https://www.instagram.com/';   // TODO: 앤서수학 인스타 계정 주소로 교체
const MAP_URL='https://map.kakao.com/?q='+encodeURIComponent('서울 동대문구 왕산로 186 우남SL타워');
const FORM_EMBED_URL='';   // TODO: 노션 '학생 등록 신청서' 게시(Publish) 후 공개 폼 링크 붙여넣기
const DOWK=['월','화','수','목','금','토','일'];
const ICON={done:'✓',miss:'✕',todo:'✎',none:'·'}, ICLASS={done:'ic-done',miss:'ic-miss',todo:'ic-todo',none:'ic-none'};
const pad=n=>String(n).padStart(2,'0');
const todayISO=()=>{const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());};

// 폴더 주소는 코드에 박지 않고 DB(students.drive_folder_url)에서 읽음 → 학생은 본인 것만 보임(명단/타인 폴더 노출 X)
const folderUrl=name=>{const st=students.find(s=>s.name===name);return (st&&st.drive_folder_url)||null;};

let mode='loading', session=null, profile=null;
let students=[], curId=null, homework=[], videos=[], unlinked=[];
let view='student', calView='month', focusDate=todayISO(), splitMode='auto', stuMode='auto', editPhone=false, regChoice=null;

async function init(){
  try{ const {data}=await sb.auth.getSession(); session=data.session;
    if(session) await enterReal(); else { mode='login'; render(); }
  }catch(e){ mode='login'; render(); }
}
sb.auth.onAuthStateChange((_e,s)=>{ if(s && mode!=='real'){ session=s; enterReal(); }});

async function enterReal(){
  mode='real'; render();
  const {data:prof}=await sb.from('profiles').select('*').eq('id',session.user.id).maybeSingle();
  profile=prof||{role:'student',name:(session.user.user_metadata.name||'사용자')};
  const {data:st}=await sb.from('students').select('*').order('name'); students=st||[];
  if(profile.role==='teacher'){ curId=students[0]?.id||null; }
  else { curId=students[0]?students[0].id:null; }
  await loadStudent(); render();
}
async function loadStudent(){
  if(!curId){homework=[];videos=[];return;}
  const {data:hw}=await sb.from('homework').select('*').eq('student_id',curId); homework=hw||[];
  const {data:vd}=await sb.from('videos').select('*').eq('student_id',curId); videos=vd||[];
}
async function loadUnlinked(){
  const {data:profs}=await sb.from('profiles').select('*').eq('role','student');
  const linked=new Set(students.map(s=>s.user_id).filter(Boolean));
  unlinked=(profs||[]).filter(p=>!linked.has(p.id) && p.id!==session.user.id);
}
async function loginKakao(){ await sb.auth.signInWithOAuth({provider:'kakao',options:{redirectTo:location.origin+location.pathname}}); }
async function logout(){ await sb.auth.signOut(); session=null;profile=null;mode='login';render(); }

async function editHW(id){ if(profile&&profile.role==='parent')return; const it=homework.find(h=>h.id===id); if(!it)return; const v=prompt('숙제 내용 수정', it.content); if(v===null)return; const tt=v.trim(); if(!tt){alert('내용을 비울 수 없어요');return;} const {error}=await sb.from('homework').update({content:tt}).eq('id',id); if(error){alert('수정 실패: '+error.message);return;} await loadStudent(); render(); }
window.A={ loginKakao, logout, startDemo:()=>{mode='demo';render();},
  setView:async v=>{view=v; if(v==='link')await loadUnlinked(); render();},
  pick:async v=>{curId=v;view='student';editPhone=false;await loadStudent();render();},
  setCal:v=>{calView=v;render();}, setFocus:d=>{focusDate=d;render();}, setSplit:v=>{splitMode=v;render();},
  autoSplit, manualAdd, toggle, editHW, linkStudent, studentAdd, openFolder, saveGuardianPhone, filterStudents, filterSelect, saveMyInfo,
  stuSplit, stuAddDate, setStuMode:v=>{stuMode=v;render();}, editGuardianPhone:()=>{editPhone=true;render();}, chooseReg:v=>{regChoice=v;render();},
  dRole:r=>{D.role=r;D.focus=D.TODAY;render();}, dCal:v=>{D.cal=v;render();}, dFocus:d=>{D.focus=d;render();}, dPick:v=>{D.sel=v;render();}, dToggle, dSplit:v=>{D.split=v;render();}, dAuto, dMan, dStu, dVid, dUp:()=>{D.up=true;render();}, dUpC:()=>{D.up=false;render();} };

function openFolder(name){ const u=folderUrl(name); if(u) window.open(u,'_blank'); else alert('이 학생의 영상 폴더가 아직 연결되지 않았어요.'); }

function statusOf(items,date,today){const l=items.filter(i=>i.date===date);if(!l.length)return'none';if(l.every(i=>i.done))return'done';if(date<today)return'miss';return'todo';}
function weekStrip(items,today,cb){let h='<div class="week">';const s=new Date(today);s.setDate(s.getDate()-((s.getDay()+6)%7));for(let i=0;i<7;i++){const d=new Date(s);d.setDate(s.getDate()+i);const iso=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());const st=statusOf(items,iso,today);h+=`<div class="day ${iso===today?'today':''}" onclick="${cb}('${iso}')"><div class="dnum">${DOWK[i]} ${+iso.slice(-2)}</div><div class="ic ${ICLASS[st]}">${ICON[st]}</div></div>`;}return h+'</div>';}
function monthGrid(items,today,cb){const[y,m]=today.split('-').map(Number);const n=new Date(y,m,0).getDate();let h='<div class="calhdr">'+DOWK.map(x=>`<span>${x}</span>`).join('')+'</div><div class="mgrid">';const lead=(new Date(y,m-1,1).getDay()+6)%7;for(let i=0;i<lead;i++)h+='<div></div>';for(let day=1;day<=n;day++){const iso=y+'-'+pad(m)+'-'+pad(day);const st=statusOf(items,iso,today);h+=`<div class="mcell ${iso===today?'today':''}" onclick="${cb}('${iso}')"><span class="mn">${day}</span><div class="ic ${ICLASS[st]}">${st==='none'?'':ICON[st]}</div></div>`;}return h+'</div>';}
function calBlock(items,today,cb){return `<div class="seg small"><button class="${calView==='week'?'active':''}" onclick="A.setCal('week')">주간</button><button class="${calView==='month'?'active':''}" onclick="A.setCal('month')">월간</button></div>`+(calView==='week'?weekStrip(items,today,cb):monthGrid(items,today,cb));}

async function autoSplit(){
  const title=document.getElementById('aTitle').value.trim()||'숙제';
  const total=parseInt(document.getElementById('aTotal').value)||0;
  const start=document.getElementById('aStart').value||todayISO();
  const end=document.getElementById('aEnd').value||start;
  if(total<=0){alert('총 문항 수를 입력하세요');return;}
  const days=[];let d=new Date(start),e=new Date(end);
  while(d<=e){days.push(d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()));d.setDate(d.getDate()+1);}
  if(!days.length){alert('기간을 확인하세요');return;}
  const per=Math.ceil(total/days.length);let n=1;const rows=[];
  for(const dd of days){const f=n,t=Math.min(n+per-1,total);if(f>total)break;rows.push({student_id:curId,due_date:dd,content:`${title} ${f}~${t}번`,created_by:'teacher'});n=t+1;}
  await sb.from('homework').insert(rows); await loadStudent(); render();
}
async function manualAdd(){const c=document.getElementById('mText').value.trim(),d=document.getElementById('mDate').value||todayISO();if(!c){alert('내용을 입력하세요');return;}await sb.from('homework').insert({student_id:curId,due_date:d,content:c,created_by:'teacher'});await loadStudent();render();}
async function studentAdd(){const c=document.getElementById('sText').value.trim();if(!c)return;await sb.from('homework').insert({student_id:curId,due_date:todayISO(),content:c,created_by:'student'});await loadStudent();render();}
async function stuSplit(){
  const title=document.getElementById('sTitle').value.trim()||'내 숙제';
  const total=parseInt(document.getElementById('sTotal').value)||0;
  const start=document.getElementById('sStart').value||todayISO();
  const end=document.getElementById('sEnd').value||start;
  if(total<=0){alert('총 분량(문항 수)을 입력하세요');return;}
  const days=[];let d=new Date(start),e=new Date(end);
  while(d<=e){days.push(d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()));d.setDate(d.getDate()+1);}
  if(!days.length){alert('기간을 확인하세요');return;}
  const per=Math.ceil(total/days.length);let n=1;const rows=[];
  for(const dd of days){const f=n,t=Math.min(n+per-1,total);if(f>total)break;rows.push({student_id:curId,due_date:dd,content:`${title} ${f}~${t}번`,created_by:'student'});n=t+1;}
  await sb.from('homework').insert(rows); await loadStudent(); render();
}

  let h=`<div class="card"><h2>학생 계정 연결</h2><p class="sub">학생이 카카오로 로그인하면 아래에 나타나요. 어떤 학생인지 선택해 연결하면, 그 학생은 본인 숙제·영상만 보게 돼요.</p>${unlinked.length>6?'<input type="text" placeholder="🔍 이름 검색" oninput="A.filterStudents(this.value)" style="margin-bottom:6px">':''}`;
  if(!unlinked.length) h+='<div class="empty">아직 로그인했지만 연결 안 된 학생이 없어요. 학생이 "카카오로 로그인" 후 새로고침하세요.</div>';
  else h+=unlinked.map(p=>`<div class="srow" data-name="${p.name||''}"><div class="sn">${p.name||'(이름없음)'}</div><select onchange="A.linkStudent(this.value, '${p.id}')"><option value="">— 학생 선택 —</option>${students.filter(s=>!s.user_id).map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div>`).join('');
  h+=`<p class="hint">연결 가능한 학생(미연결): ${students.filter(s=>!s.user_id).length}명</p></div>`;
  return h;
}
function dayCard(items,date,ro){const l=items.filter(i=>i.date===date);
  const list=l.length?l.map(i=>`<div class="hwitem ${i.done?'done':''} ${ro?'readonly':''}"><span class="chk ${i.done?'on':''}" onclick="${ro?'':'A.toggle(\''+i.id+'\')'}">${i.done?'☑':'☐'}</span><span class="txt">${i.text}</span>${i.by==='student'?'<span class="tag stu">학생</span>':'<span class="tag">선생님</span>'}${ro?'':'<button class="ghostbtn" style="padding:4px 9px;font-size:12px" onclick="A.editHW(\''+i.id+'\')">수정</button>'}</div>`).join(''):'<div class="empty">이 날은 등록된 숙제가 없어요.</div>';
  return `<div class="card"><h2>${+date.slice(-2)}일 숙제</h2><p class="sub">${ro?'':'체크하면 저장됩니다'}</p>${list}</div>`;}
function videoList(vs){if(!vs.length)return '<div class="empty" style="margin-top:10px">아직 분석된 복습영상이 없어요.</div>';
  return vs.map(v=>v.status==='ing'?`<div class="vid"><div class="vh"><span class="vt">${v.title||'복습영상'}</span><span style="color:var(--amber);font-weight:600">분석 중…</span></div></div>`:`<div class="vid"><div class="vh"><span class="vt">${v.title||'복습영상'}</span><span class="stars">${'★'.repeat(v.stars||0)}${'☆'.repeat(5-(v.stars||0))}</span></div><p class="fb">${v.feedback||''}</p>${v.error_note?`<div class="err">보완: ${v.error_note}</div>`:''}</div>`).join('');}

const D={TODAY:'2026-06-11',role:'teacher',sel:'s1',cal:'month',focus:'2026-06-11',split:'auto',up:false,uid:100,
 students:[{id:'s1',name:'김윤하',grade:'고1',subject:'경우의 수'},{id:'s2',name:'조세빈',grade:'고2',subject:'수열'},{id:'s3',name:'정혜교',grade:'중3',subject:'이차함수'}],
 items:[{id:'h1',sid:'s1',date:'2026-06-08',text:'경우의 수 1~8번',done:true,by:'teacher'},{id:'h2',sid:'s1',date:'2026-06-09',text:'경우의 수 9~16번',done:true,by:'teacher'},{id:'h3',sid:'s1',date:'2026-06-10',text:'경우의 수 17~24번',done:false,by:'teacher'},{id:'h4',sid:'s1',date:'2026-06-11',text:'곱법칙 프린트 1~6번',done:true,by:'teacher'},{id:'h5',sid:'s1',date:'2026-06-11',text:'곱법칙 프린트 7~12번',done:false,by:'teacher'},{id:'h7',sid:'s1',date:'2026-06-12',text:'경우의 수 25~30번',done:false,by:'teacher'},{id:'h8',sid:'s2',date:'2026-06-09',text:'등차수열 1~10번',done:true,by:'teacher'},{id:'h9',sid:'s3',date:'2026-06-10',text:'이차함수 RPM',done:false,by:'teacher'}],
 videos:[{id:'v1',sid:'s1',title:'경우의 수 길찾기 12번',status:'done',stars:4,feedback:'풀이 근거를 또박또박 설명했어요.',error_note:'마지막 경로 1가지 누락'}]};
function dItems(sid,date){return D.items.filter(i=>i.sid===sid&&i.date===date);}
function dCalBlock(sid){const items=D.items.filter(i=>i.sid===sid).map(i=>({date:i.date,done:i.done}));const f=cb=>D.cal==='week'?weekStrip(items,D.TODAY,cb):monthGrid(items,D.TODAY,cb);return `<div class="seg small"><button class="${D.cal==='week'?'active':''}" onclick="A.dCal('week')">주간</button><button class="${D.cal==='month'?'active':''}" onclick="A.dCal('month')">월간</button></div>`+f('A.dFocus');}
function dChk(sid,date,ro){const l=dItems(sid,date);if(!l.length)return'<div class="empty">이 날은 숙제가 없어요.</div>';return l.map(i=>`<div class="hwitem ${i.done?'done':''} ${ro?'readonly':''}"><span class="chk ${i.done?'on':''}" onclick="${ro?'':'A.dToggle(\''+i.id+'\')'}">${i.done?'☑':'☐'}</span><span class="txt">${i.text}</span>${i.by==='student'?'<span class="tag stu">학생</span>':'<span class="tag">선생님</span>'}</div>`).join('');}
function dVids(sid){const vs=D.videos.filter(v=>v.sid===sid);if(!vs.length)return'<div class="empty">아직 영상이 없어요.</div>';return vs.map(v=>v.status==='ing'?`<div class="vid"><div class="vh"><span class="vt">${v.title}</span><span style="color:var(--amber);font-weight:600">분석 중…</span></div></div>`:`<div class="vid"><div class="vh"><span class="vt">${v.title}</span><span class="stars">${'★'.repeat(v.stars)}${'☆'.repeat(5-v.stars)}</span></div><p class="fb">${v.feedback}</p>${v.error_note?`<div class="err">보완: ${v.error_note}</div>`:''}</div>`).join('');}
function dInfo(sid){return D.students.find(s=>s.id===sid);}
function dToggle(id){if(D.role==='parent')return;const it=D.items.find(i=>i.id===id);if(it){it.done=!it.done;render();}}
function dAuto(){const t=document.getElementById('dTitle').value.trim()||'숙제';const tot=parseInt(document.getElementById('dTotal').value)||0;if(tot<=0){alert('총 문항');return;}const days=['2026-06-11','2026-06-12','2026-06-13','2026-06-14'];const per=Math.ceil(tot/days.length);let n=1;days.forEach(d=>{const f=n,to=Math.min(n+per-1,tot);if(f>tot)return;D.items.push({id:'h'+(D.uid++),sid:D.sel,date:d,text:`${t} ${f}~${to}번`,done:false,by:'teacher'});n=to+1;});render();}
function dMan(){const d=document.getElementById('dmDate').value,t=document.getElementById('dmText').value.trim();if(!d||!t)return;D.items.push({id:'h'+(D.uid++),sid:D.sel,date:d,text:t,done:false,by:'teacher'});render();}
function dStu(){const t=document.getElementById('dsText').value.trim();if(!t)return;D.items.push({id:'h'+(D.uid++),sid:D.sel,date:D.TODAY,text:t,done:false,by:'student'});render();}
function dVid(){const v={id:'v'+(D.uid++),sid:D.sel,title:'복습영상 (방금 제출)',status:'ing',stars:0};D.videos.unshift(v);D.up=false;render();setTimeout(()=>{v.status='done';v.stars=4;v.feedback='풀이를 단계별로 잘 설명했어요.';v.error_note='검산 한 줄 추가하면 완벽';render();},1500);}
function demoHtml(){const sid=D.sel,s=dInfo(sid);let h=`<div class="card"><div class="seg" style="max-width:330px"><button class="${D.role==='teacher'?'active':''}" onclick="A.dRole('teacher')">선생님</button><button class="${D.role==='student'?'active':''}" onclick="A.dRole('student')">학생</button><button class="${D.role==='parent'?'active':''}" onclick="A.dRole('parent')">학부모</button></div><div style="margin-top:10px"><select onchange="A.dPick(this.value)">`+D.students.map(x=>`<option value="${x.id}" ${x.id===D.sel?'selected':''}>${x.name}</option>`).join('')+`</select></div></div>`;
if(D.role==='teacher'){const tot=D.items.filter(i=>i.sid===sid).length,dn=D.items.filter(i=>i.sid===sid&&i.done).length;
h+=`<div class="card"><h2>${s.name} · ${s.grade} · ${s.subject}</h2>${dCalBlock(sid)}<div class="stat"><div class="box"><b>${tot}</b><span>등록</span></div><div class="box"><b style="color:var(--green)">${dn}</b><span>완료</span></div><div class="box"><b style="color:var(--red)">${tot-dn}</b><span>미완료</span></div></div></div>`;
h+=`<div class="card"><h2>숙제 등록</h2><div class="seg small" style="max-width:240px"><button class="${D.split==='auto'?'active':''}" onclick="A.dSplit('auto')">자동 분배</button><button class="${D.split==='manual'?'active':''}" onclick="A.dSplit('manual')">직접 입력</button></div>`;
if(D.split==='auto')h+=`<label>숙제 이름</label><input id="dTitle" type="text" placeholder="예: 프린트"><div class="row"><div><label>총 문항</label><input id="dTotal" type="number" placeholder="30"></div></div><button class="btn" onclick="A.dAuto()">자동 분배</button>`;
else h+=`<label>날짜</label><input id="dmDate" type="date" value="2026-06-11"><label>내용</label><input id="dmText" type="text"><button class="btn" onclick="A.dMan()">추가</button>`;
h+=`</div><div class="card"><h2>${+D.focus.slice(-2)}일 숙제</h2>${dChk(sid,D.focus,false)}</div><div class="card"><h2>복습영상</h2>${dVids(sid)}</div>`;}
if(D.role==='student'){h+=`<div class="card"><h2>안녕, ${s.name}! <span class="badge b-stu">학생</span></h2>${dCalBlock(sid)}</div><div class="card"><h2>오늘 숙제</h2>${dChk(sid,D.TODAY,false)}<label style="margin-top:14px">나도 숙제 추가</label><div class="row"><div style="flex:3"><input id="dsText" type="text"></div><div><button class="btn ghost" style="margin-top:0" onclick="A.dStu()">추가</button></div></div></div><div class="card"><h2>복습영상</h2><a class="btn ghost full" href="recording-guide.pdf" target="_blank" rel="noopener" style="text-decoration:none;display:block;text-align:center;box-sizing:border-box;margin-bottom:10px">📖 녹화 방법 보기</a>${D.up?`<button class="btn amber" onclick="A.dVid()">제출(데모)</button> <button class="btn ghost" onclick="A.dUpC()">취소</button>`:`<button class="btn amber full" onclick="A.dUp()">＋ 복습영상 올리기</button>`}<div style="margin-top:12px">${dVids(sid)}</div></div>`;}
if(D.role==='parent'){const td=dItems(sid,D.TODAY),done=td.filter(i=>i.done).length;h+=`<div class="card readonly"><h2>${s.name} 학습 현황 <span class="badge b-parent">학부모</span></h2>${dCalBlock(sid)}</div><div class="card readonly"><h2>오늘</h2><p class="sub">${td.length}개 중 ${done}개 완료</p>${dChk(sid,D.TODAY,true)}</div><div class="card"><h2>학부모 알림 미리보기</h2><div class="preview"><span style="font-size:18px">🔔</span><div><p class="ttl">[앤서수학교습소] 오늘의 학습 알림</p><p>${s.name} 학생 학부모님, 오늘 숙제 ${td.length}개 중 ${done}개 완료했어요.</p></div></div></div>`;}
return h;}

init();
</script>
</body>
</html>
